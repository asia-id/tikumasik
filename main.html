<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKUM ASIK - Realtime Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --bg: #0d0d0d; --card: #141414; --border: #222;
            --text-main: #e0e0e0; --text-dim: #888;
            --accent-soft: #3498db; --founder: #f1c40f; --admin: #2ecc71;
            --overlay: rgba(0,0,0,0.96);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* Navbar */
        #nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(13,13,13,0.85); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .logo-text { font-weight: 600; font-size: 16px; color: #fff; }
        .user-nav { display: flex; align-items: center; gap: 12px; }
        .btn-post { background: var(--accent-soft); color: white; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .avatar-nav { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background-size: cover; background-position: center; background-color: #222; display: flex; align-items: center; justify-content: center; }

        /* Dropdown */
        .dropdown { position: absolute; top: 55px; right: 10px; background: #1a1a1a; min-width: 150px; border-radius: 10px; display: none; flex-direction: column; padding: 5px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown.show { display: flex; }
        .dropdown button { background: transparent; color: var(--text-main); border: none; text-align: left; padding: 12px; font-size: 13px; }

        /* Banner & Assets */
        #banner { width: 100%; height: 300px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; margin-top: 60px; border-bottom: 1px solid var(--border); overflow: hidden; }
        #bannerImg { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0.3; transition: 0.3s; }
        #groupPic { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--border); z-index: 2; background-size: cover; background-position: center; background-color: #1a1a1a; }
        #groupDesc { z-index: 2; color: var(--text-dim); margin-top: 12px; font-size: 12px; max-width: 80%; text-align: center; font-weight: 300; }

        /* Gallery 2 Columns Mobile */
        .container { padding: 15px; width: 100%; margin: auto; }
        #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .card img.post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
        .card-footer { padding: 8px; display: flex; align-items: center; gap: 8px; }
        .card-footer img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .user-info span { font-size: 10px; font-weight: 500; display: block; }

        /* Badges */
        .badge { font-size: 7px; padding: 2px 5px; border-radius: 3px; font-weight: 600; border: 1px solid transparent; text-transform: uppercase; margin-top: 2px; display: inline-block; }
        .badge-founder { border-color: var(--founder); color: var(--founder); }
        .badge-admin { border-color: var(--admin); color: var(--admin); }
        .badge-custom { border-color: #555; color: #bbb; }

        /* Toast & Modals */
        #toast-container { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; pointer-events: none; }
        .toast { background: #1a1a1a; color: #fff; padding: 12px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 12px; text-align: center; opacity: 0; transform: translateY(-10px); transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }

        .modal-ui { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 5000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #161616; width: 100%; max-width: 340px; padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .modal-box input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 20px; font-size: 16px; outline: none; }

        #imagePreviewOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 6000; align-items: center; justify-content: center; }
        #imagePreviewOverlay img { max-width: 100%; max-height: 100vh; object-fit: contain; }

        @media (min-width: 768px) {
            #gallery { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
            .logo-text { font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="nav">
    <div class="logo-text">TIKUM ASIK</div>
    <div class="user-nav">
        <button class="btn-post" onclick="document.getElementById('inpFile').click()">+ Post</button>
        <div id="userAvatar" class="avatar-nav" onclick="toggleDropdown()"></div>
        <div id="userDropdown" class="dropdown">
            <button onclick="lihatProfil()">Profil</button>
            <button onclick="document.getElementById('inpProfile').click()">Ganti Foto</button>
            <button onclick="logout()" style="color:#555">Keluar</button>
        </div>
    </div>
</div>

<div id="imagePreviewOverlay" onclick="this.style.display='none'">
    <img id="previewImgContent" src="">
</div>

<div id="uiModal" class="modal-ui">
    <div class="modal-box">
        <h4 id="uiTitle" style="color:#fff; margin-bottom:10px;"></h4>
        <p id="uiDesc" style="font-size:13px; color:var(--text-dim); margin-bottom:20px;"></p>
        <div id="uiInputArea"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeUIModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#222; color:#888;">Batal</button>
            <button id="uiConfirmBtn" style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--accent-soft); color:#fff; font-weight:600;"></button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<input type="file" id="inpFile" hidden onchange="uploadPost()">
<input type="file" id="inpProfile" hidden onchange="updateProfile()">
<input type="file" id="inpBanner" hidden onchange="changeBanner()">
<input type="file" id="inpLogo" hidden onchange="changeLogo()">

<div id="banner">
    <img id="bannerImg" src="" onclick="triggerAsset('banner')">
    <div id="groupPic" onclick="triggerAsset('logo')"></div>
    <div id="statusTag" style="z-index:2; margin-top:10px;"></div>
    <p id="groupDesc" onclick="triggerEditDesc()">Klik untuk deskripsi...</p>
</div>

<div class="container">
    <div id="gallery"></div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyBaF_6SJBrXJJC5tBtq3CKf-kYJpP9SgS4",
      authDomain: "tikum-kenangan-2.firebaseapp.com",
      databaseURL: "https://tikum-kenangan-2-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "tikum-kenangan-2",
      storageBucket: "tikum-kenangan-2.firebasestorage.app",
      messagingSenderId: "675001070135",
      appId: "1:675001070135:web:a8f8b48ef2a5c79ec8c5b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const cloudName = "dbtmyrmn8";
    const uploadPreset = "tikumkenangan";

    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let users = [];
    let galeri = [];

    function init() {
        if(!currentUser) { window.location.href = "login.html"; return; }
        
        // Ambil Data Realtime dari Firebase
        db.ref('users').on('value', snap => {
            users = snap.val() || [];
            renderUserNav();
            checkRole();
        });

        db.ref('galeri').on('value', snap => {
            galeri = snap.val() || [];
            renderGallery();
        });

        db.ref('assets').on('value', snap => {
            const assets = snap.val() || {};
            if(assets.banner) document.getElementById('bannerImg').src = assets.banner;
            if(assets.logo) document.getElementById('groupPic').style.backgroundImage = `url(${assets.logo})`;
            if(assets.desc) document.getElementById('groupDesc').innerText = assets.desc;
        });
    }

    function checkRole() {
        const u = users.find(x => x.username === currentUser.username);
        const role = (currentUser.username === 'vixzaa') ? 'founder' : (u ? u.role : 'user');
        const tag = document.getElementById('statusTag');
        if(role === 'founder') tag.innerHTML = '<span class="badge badge-founder">Founder</span>';
        else if(role === 'admin') tag.innerHTML = '<span class="badge badge-admin">Admin</span>';
        return role;
    }

    function renderGallery() {
        const role = checkRole();
        const container = document.getElementById('gallery');
        container.innerHTML = galeri.map((g, i) => {
            const uDB = users.find(u => u.username === g.user);
            const uRole = (g.user === 'vixzaa') ? 'founder' : (uDB ? uDB.role : 'user');
            const canD = (g.user === currentUser.username) || (role === 'founder') || (role === 'admin');
            let b = uRole === 'founder' ? '<span class="badge badge-founder">F</span>' : (uRole === 'admin' ? '<span class="badge badge-admin">A</span>' : '');
            if(uDB && uDB.customTitle) b += `<span class="badge badge-custom">${uDB.customTitle}</span>`;

            return `<div class="card">
                <img src="${g.url}" class="post-img" onclick="openPreview('${g.url}')">
                <div class="card-footer">
                    <img src="${g.profileUrl || 'https://ui-avatars.com/api/?name='+g.user}">
                    <div class="user-info">
                        <span>${g.user}</span>
                        <div>${b}</div>
                    </div>
                    ${canD ? `<button onclick="hapusFoto(${i})" style="margin-left:auto; background:none; border:none; color:#444; font-size:14px;">×</button>` : ''}
                </div>
            </div>`;
        }).reverse().join(''); // Postingan terbaru di atas
    }

    // --- CLOUDINARY & ACTION LOGIC ---
    async function uploadToCloud(file) {
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', uploadPreset);
        const r = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, {method:'POST', body:fd});
        return await r.json();
    }

    async function uploadPost() {
        showToast("Mengunggah foto ke awan...");
        const r = await uploadToCloud(document.getElementById('inpFile').files[0]);
        const me = users.find(u => u.username === currentUser.username);
        galeri.push({user: currentUser.username, url: r.secure_url, profileUrl: me ? me.profileUrl : ""});
        db.ref('galeri').set(galeri);
    }

    async function updateProfile() {
        showToast("Memperbarui foto profil...");
        const r = await uploadToCloud(document.getElementById('inpProfile').files[0]);
        const idx = users.findIndex(u => u.username === currentUser.username);
        if(idx !== -1) {
            users[idx].profileUrl = r.secure_url;
            db.ref('users').set(users);
            currentUser.profileUrl = r.secure_url;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        }
    }

    function hapusFoto(i) {
        openUIModal("Hapus Postingan?", "Foto ini akan hilang dari galeri selamanya.", "Hapus", () => {
            galeri.splice(i, 1);
            db.ref('galeri').set(galeri);
        });
    }

    // --- ASSETS LOGIC ---
    function triggerAsset(t) { if(currentUser.username === 'vixzaa') document.getElementById(t === 'banner' ? 'inpBanner' : 'inpLogo').click(); }
    async function changeBanner() { const r = await uploadToCloud(document.getElementById('inpBanner').files[0]); db.ref('assets/banner').set(r.secure_url); }
    async function changeLogo() { const r = await uploadToCloud(document.getElementById('inpLogo').files[0]); db.ref('assets/logo').set(r.secure_url); }
    function triggerEditDesc() {
        if(currentUser.username !== 'vixzaa') return;
        openUIModal("Edit Deskripsi", "Tulis kata sambutan baru.", "Simpan", (v) => {
            if(v) db.ref('assets/desc').set(v);
        }, true, document.getElementById('groupDesc').innerText);
    }

    // --- UI HELPERS ---
    function showToast(m) {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.classList.add('show'), 50);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
    }
    function openPreview(u) { document.getElementById('previewImgContent').src = u; document.getElementById('imagePreviewOverlay').style.display = 'flex'; }
    function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('show'); }
    function logout() { localStorage.removeItem('currentUser'); window.location.href = "login.html"; }
    function renderUserNav() {
        const n = document.getElementById('userAvatar');
        const me = users.find(u => u.username === currentUser.username);
        if(me && me.profileUrl) n.style.backgroundImage = `url(${me.profileUrl})`;
        else n.innerText = currentUser.username[0].toUpperCase();
    }
    function openUIModal(t, d, b, c, inp=false, val="") {
        document.getElementById('uiTitle').innerText = t; document.getElementById('uiDesc').innerText = d;
        const btn = document.getElementById('uiConfirmBtn'); btn.innerText = b;
        const area = document.getElementById('uiInputArea'); area.innerHTML = inp ? `<input type="text" id="uiInput" value="${val}">` : "";
        btn.onclick = () => { c(inp ? document.getElementById('uiInput').value : null); closeUIModal(); };
        document.getElementById('uiModal').style.display = 'flex';
    }
    function closeUIModal() { document.getElementById('uiModal').style.display = 'none'; }
    function lihatProfil() { const me = users.find(u => u.username === currentUser.username); if(me && me.profileUrl) openPreview(me.profileUrl); }

    init();
</script>
</body>
</html>
