<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKUM ASIK - Premium Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --accent: #f1c40f; /* Warna Gold untuk Admin */
            --blue: #3498db;
            --danger: #e74c3c;
            --text: #eeeeee;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- Navigasi & Header --- */
        #topBar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--blue); letter-spacing: 1px; }

        .nav-controls { display: flex; align-items: center; gap: 15px; }

        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-upload { background: var(--blue); color: white; }
        .btn-admin { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-admin:hover { background: var(--accent); color: #000; }

        /* --- Profile Dropdown --- */
        .user-section { position: relative; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--blue);
            cursor: pointer; background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .dropdown {
            position: absolute; top: 50px; right: 0; background: var(--card);
            min-width: 180px; border-radius: 12px; display: none;
            flex-direction: column; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown.show { display: flex; }
        .dropdown button {
            background: transparent; color: white; border: none; text-align: left;
            padding: 10px; border-radius: 6px; cursor: pointer;
        }
        .dropdown button:hover { background: #333; }

        /* --- Banner Section --- */
        #banner {
            width: 100%; height: 400px; margin-top: 70px;
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            overflow: hidden;
        }
        #bannerImg {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; opacity: 0.5; z-index: 0;
        }
        #groupProfile {
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid white;
            z-index: 1; background: #333; cursor: pointer;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
        }
        #groupName { z-index: 1; font-size: 3em; margin: 10px 0 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* --- Gallery Content --- */
        .container { padding: 40px; }
        #gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .photo-card {
            background: var(--card); border-radius: 15px; overflow: hidden;
            transition: 0.3s; position: relative;
        }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; height: 280px; object-fit: cover; cursor: pointer; }
        .photo-info { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .photo-info img { width: 30px; height: 30px; border-radius: 50%; }

        /* --- Admin Section --- */
        #adminPanel { display: none; padding: 40px; background: #111; min-height: 100vh; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; border-radius: 5px; }

        /* --- Modal Login Admin --- */
        #adminLoginModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 20px;
            width: 320px; text-align: center; border: 1px solid var(--accent);
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #333; background: #000; color: white; box-sizing: border-box;
        }

        /* Modal Preview */
        #modalPreview {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 3000; align-items: center; justify-content: center;
        }
        #modalImg { max-width: 90%; max-height: 85%; border-radius: 10px; }
    </style>
</head>
<body>

<div id="topBar">
    <div class="logo">TIKUM ASIK</div>
    <div class="nav-controls">
        <button class="btn btn-admin" onclick="openAdminLogin()">🛠 Admin Panel</button>
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📤 Upload</button>
        <div class="user-section">
            <div id="userAvatar" class="avatar" onclick="toggleDropdown()"></div>
            <div id="userDropdown" class="dropdown">
                <button onclick="document.getElementById('profileUpload').click()">✏️ Ganti Foto</button>
                <button onclick="logout()" style="color:var(--danger)">🚪 Logout</button>
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" onchange="uploadPhoto()" multiple hidden>
<input type="file" id="profileUpload" onchange="updateProfile()" hidden>
<input type="file" id="bannerUpload" onchange="updateBanner()" hidden>
<input type="file" id="groupPicUpload" onchange="updateGroupPic()" hidden>

<div id="galleryView">
    <div id="banner">
        <img id="bannerImg" src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?q=80&w=1600&auto=format&fit=crop" onclick="triggerBanner()">
        <div id="groupProfile" onclick="triggerGroupPic()">T</div>
        <h1 id="groupName">TIKUM ASIK</h1>
        <p id="adminNote" style="color: var(--accent); z-index: 1;"></p>
    </div>

    <div class="container">
        <div id="gallery"></div>
    </div>
</div>

<div id="adminPanel">
    <button class="btn btn-upload" onclick="closeAdminPanel()">← Kembali Ke Galeri</button>
    <h1>Super Admin Control</h1>
    
    <h3>Daftar User Terdaftar</h3>
    <table class="admin-table" id="userTable">
        <thead><tr><th>Avatar</th><th>Username</th><th>Aksi</th></tr></thead>
        <tbody></tbody>
    </table>

    <h3 style="margin-top:50px;">Manajemen Semua Postingan</h3>
    <table class="admin-table" id="postTable">
        <thead><tr><th>Preview</th><th>User</th><th>Aksi</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="adminLoginModal">
    <div class="login-box">
        <h2 style="color:var(--accent)">ADMIN LOGIN</h2>
        <input type="text" id="admUser" placeholder="Username Khusus">
        <input type="password" id="admPass" placeholder="Password Khusus">
        <button class="btn btn-upload" style="width:100%; margin-top:10px; background:var(--accent); color:#000" onclick="prosesLoginAdmin()">Login</button>
        <button class="btn" style="width:100%; margin-top:10px; color:#666" onclick="closeAdminLogin()">Batal</button>
    </div>
</div>

<div id="modalPreview" onclick="this.style.display='none'">
    <img id="modalImg">
</div>

<script>
    // --- KONFIGURASI ---
    const cloudName = "dbtmyrmn8";
    const uploadPreset = "tikumkenangan";

    let state = {
        currentUser: JSON.parse(localStorage.getItem('currentUser')),
        users: JSON.parse(localStorage.getItem('users') || "[]"),
        galeri: JSON.parse(localStorage.getItem('galeri') || "[]"),
        isAdmin: false
    };

    function init() {
        if(!state.currentUser) { window.location.href = "login.html"; return; }
        renderUser();
        renderGallery();
        loadGroupAssets();
    }

    // --- UI FUNCTIONS ---
    function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('show'); }
    function openAdminLogin() { document.getElementById('adminLoginModal').style.display = 'flex'; }
    function closeAdminLogin() { document.getElementById('adminLoginModal').style.display = 'none'; }
    
    function closeAdminPanel() {
        state.isAdmin = false;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('galleryView').style.display = 'block';
        document.getElementById('adminNote').innerText = "";
    }

    // --- LOGIKA LOGIN ADMIN ---
    function prosesLoginAdmin() {
        const u = document.getElementById('admUser').value;
        const p = document.getElementById('admPass').value;

        if(u === "vixzaa" && p === "raffizaherex076") {
            state.isAdmin = true;
            closeAdminLogin();
            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminNote').innerText = "Mode Admin Aktif: Klik Banner/Logo untuk edit";
            renderAdminTables();
        } else {
            alert("Akses Ditolak! Kredensial salah.");
        }
    }

    // --- CORE GALLERY FUNCTIONS ---
    async function uploadToCloudinary(file, folder) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', uploadPreset);
        formData.append('folder', folder);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: "POST", body: formData });
        return await res.json();
    }

    async function uploadPhoto() {
        const files = document.getElementById('fileInput').files;
        for(let file of files) {
            const data = await uploadToCloudinary(file, 'gallery');
            state.galeri.push({ 
                user: state.currentUser.username, 
                url: data.secure_url, 
                profileUrl: state.currentUser.profileUrl 
            });
        }
        localStorage.setItem('galeri', JSON.stringify(state.galeri));
        renderGallery();
    }

    async function updateProfile() {
        const file = document.getElementById('profileUpload').files[0];
        const data = await uploadToCloudinary(file, 'profiles');
        
        // Update Session
        state.currentUser.profileUrl = data.secure_url;
        localStorage.setItem('currentUser', JSON.stringify(state.currentUser));

        // Update Database
        let idx = state.users.findIndex(u => u.username === state.currentUser.username);
        if(idx !== -1) {
            state.users[idx].profileUrl = data.secure_url;
            localStorage.setItem('users', JSON.stringify(state.users));
        }
        renderUser();
        renderGallery();
    }

    function renderUser() {
        const div = document.getElementById('userAvatar');
        if(state.currentUser.profileUrl) {
            div.style.backgroundImage = `url(${state.currentUser.profileUrl})`;
            div.innerText = "";
        } else {
            div.style.backgroundImage = "none";
            div.innerText = state.currentUser.username[0].toUpperCase();
        }
    }

    function renderGallery() {
        const container = document.getElementById('gallery');
        container.innerHTML = state.galeri.map((f, i) => `
            <div class="photo-card">
                <img src="${f.url}" onclick="openModal('${f.url}')">
                <div class="photo-info">
                    <img src="${f.profileUrl || 'https://ui-avatars.com/api/?name='+f.user}">
                    <span>${f.user}</span>
                </div>
                ${f.user === state.currentUser.username ? `<button class="btn-danger" style="position:absolute; top:10px; right:10px; border:none; cursor:pointer" onclick="hapusFoto(${i})">Hapus</button>` : ''}
            </div>
        `).join('');
    }

    // --- ADMIN ACTIONS ---
    function renderAdminTables() {
        const uTable = document.querySelector('#userTable tbody');
        uTable.innerHTML = state.users.map((u, i) => `
            <tr>
                <td><img src="${u.profileUrl || ''}" class="avatar" style="width:30px; height:30px;"></td>
                <td>${u.username}</td>
                <td><button class="btn-danger" onclick="hapusUser(${i})">Hapus Akun</button></td>
            </tr>
        `).join('');

        const pTable = document.querySelector('#postTable tbody');
        pTable.innerHTML = state.galeri.map((g, i) => `
            <tr>
                <td><img src="${g.url}" style="width:50px; border-radius:4px;"></td>
                <td>${g.user}</td>
                <td><button class="btn-danger" onclick="hapusFoto(${i}, true)">Hapus Paksa</button></td>
            </tr>
        `).join('');
    }

    function hapusUser(i) {
        if(confirm("Hapus user ini?")) {
            state.users.splice(i, 1);
            localStorage.setItem('users', JSON.stringify(state.users));
            renderAdminTables();
        }
    }

    function hapusFoto(i, fromAdmin = false) {
        if(confirm("Hapus postingan ini?")) {
            state.galeri.splice(i, 1);
            localStorage.setItem('galeri', JSON.stringify(state.galeri));
            renderGallery();
            if(fromAdmin) renderAdminTables();
        }
    }

    // --- GROUP ASSETS (ONLY ADMIN) ---
    function triggerBanner() { if(state.isAdmin) document.getElementById('bannerUpload').click(); }
    function triggerGroupPic() { if(state.isAdmin) document.getElementById('groupPicUpload').click(); }

    async function updateBanner() {
        const file = document.getElementById('bannerUpload').files[0];
        const data = await uploadToCloudinary(file, 'group');
        localStorage.setItem('groupBanner', data.secure_url);
        document.getElementById('bannerImg').src = data.secure_url;
    }

    async function updateGroupPic() {
        const file = document.getElementById('groupPicUpload').files[0];
        const data = await uploadToCloudinary(file, 'group');
        localStorage.setItem('groupPic', data.secure_url);
        loadGroupAssets();
    }

    function loadGroupAssets() {
        const b = localStorage.getItem('groupBanner');
        const p = localStorage.getItem('groupPic');
        if(b) document.getElementById('bannerImg').src = b;
        if(p) {
            const gp = document.getElementById('groupProfile');
            gp.style.backgroundImage = `url(${p})`;
            gp.innerText = "";
        }
    }

    function openModal(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('modalPreview').style.display = 'flex';
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = "login.html";
    }

    init();
</script>
</body>
</html>
