<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TIKUM ASIK</title>
    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #0d0d0d; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 340px; text-align: center; border: 1px solid #333; }
        h2 { color: #3498db; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #3498db; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        .toggle { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; display: block; }
        .toggle b { color: #3498db; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Login Tikum</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="proses()">Masuk</button>
    <span class="toggle" onclick="toggleMode()">Belum punya akun? <b id="toggleText">Daftar</b></span>
</div>

<script>
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "Login Tikum" : "Daftar Akun";
        document.getElementById('toggleText').innerText = isLoginMode ? "Daftar" : "Login";
    }

    function proses() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if(!user || !pass) return alert("Isi semua data!");

        let users = JSON.parse(localStorage.getItem('users') || "[]");

        if (isLoginMode) {
            // 1. CEK LOGIN ADMIN KHUSUS
            if (user === "vixzaa" && pass === "raffizaherex076") {
                const adminObj = { username: "vixzaa", role: "admin", profileUrl: "" };
                localStorage.setItem('currentUser', JSON.stringify(adminObj));
                // Pastikan admin ada di daftar user
                if(!users.some(u => u.username === "vixzaa")) {
                    users.push(adminObj);
                    localStorage.setItem('users', JSON.stringify(users));
                }
                window.location.href = "main.html";
                return;
            }

            // 2. CEK LOGIN USER BIASA
            const found = users.find(u => u.username === user && u.password === pass);
            if (found) {
                localStorage.setItem('currentUser', JSON.stringify(found));
                window.location.href = "main.html";
            } else {
                alert("Username atau Password salah!");
            }
        } else {
            // 3. DAFTAR USER BARU
            if(user.toLowerCase() === "vixzaa") return alert("Username ini dilindungi!");
            if(users.some(u => u.username === user)) return alert("Username sudah ada!");

            users.push({ username: user, password: pass, profileUrl: "", role: "user" });
            localStorage.setItem('users', JSON.stringify(users));
            alert("Berhasil daftar! Silahkan login.");
            toggleMode();
        }
    }
</script>
</body>
</html>
